server.port=8081
spring.application.name=Usuarios

spring.datasource.url=jdbc:sqlite:Usuarios.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.ejb.persistenceProvider=org.hibernate.jpa.HibernatePersistenceProvider

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework.web: DEBUG

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

app.admin.nombre=Admin Principal
app.admin.email=admin@inmobiliaria.com
app.admin.password=Admin1234!